<!doctype html>
<html>
<head>
    <title>Icon Check</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .icon-test { width: 256px; height: 256px; border: 2px solid #ccc; display: flex; align-items: center; justify-content: center; margin: 20px 0; }
    </style>
</head>
<body>
    <h1>Icon Test</h1>
    
    <h2>favicon.ico</h2>
    <div class="icon-test">
        <img src="/favicon.ico" alt="favicon.ico" />
    </div>
    
    <h2>nyou-icon.ico</h2>
    <div class="icon-test">
        <img src="/nyou-icon.ico" alt="nyou-icon.ico" />
    </div>
    
    <h2>favicon.png</h2>
    <div class="icon-test">
        <img src="/favicon.png" alt="favicon.png" />
    </div>
    
    <h2>Manifest Icons</h2>
    <script>
        fetch('/manifest.webmanifest')
            .then(r => r.json())
            .then(data => {
                const manifest = document.createElement('pre');
                manifest.textContent = JSON.stringify(data, null, 2);
                document.body.appendChild(manifest);
            });
    </script>
</body>
</html>
